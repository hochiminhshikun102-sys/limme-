<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="LIMME 柠美体验版 - AI私人管家与服务原型">
  <title>LIMME 柠美 - GitHub 版</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="top-header">
    <h1>LIMME 柠美</h1>
    <p>AI 私人管家 · 全品类陪伴服务</p>
  </header>

  <main class="container">
    <section id="page-home" class="page active">
      <article class="card">
        <h2>热门服务</h2>
        <div class="grid">
          <button class="service-item" data-msg="轻医美页面已打开，可预约、选项目、下单">轻医美</button>
          <button class="service-item" data-msg="中医调理页面已打开，支持套餐选购">中医调理</button>
          <button class="service-item" data-msg="上门服务页面已打开，支持推拿和康养预约">上门服务</button>
          <button class="service-item" data-msg="瑜伽课程页面已打开，支持排课提醒">瑜伽课程</button>
          <button class="service-item" data-msg="美颜中心已打开，支持滤镜和素颜管理">美颜管理</button>
          <button class="service-item" data-modal="bill">账单/到账</button>
        </div>
      </article>

      <article class="card">
        <h2>商城消费｜比价</h2>
        <p>全网同款自动比价｜三层分类选购</p>
        <div class="actions">
          <button class="btn" data-msg="比价功能已加载，支持低价推荐">立即比价</button>
          <button class="btn" data-msg="商城首页已打开，可加入购物车">进入商城</button>
        </div>
      </article>

      <article class="card">
        <h2>专属私密功能</h2>
        <div class="actions">
          <button class="btn" data-modal="boy">私密 AI 男友</button>
          <button class="btn" data-msg="电子衣柜已打开，支持搭配管理">电子衣柜</button>
          <button class="btn" data-msg="闺蜜频道已打开，支持分享社区">闺蜜频道</button>
        </div>
      </article>

      <article class="card">
        <h2>预约与消息提醒</h2>
        <p>预约倒计时、服务通知、到账推送</p>
        <div class="actions">
          <button class="btn" data-modal="order">我的预约</button>
        </div>
      </article>
    </section>

    <section id="page-mall" class="page">
      <article class="card">
        <h2>商城</h2>
        <p>这里可以接入真实商品数据与支付逻辑。</p>
      </article>
    </section>

    <section id="page-booking" class="page">
      <article class="card">
        <h2>预约中心</h2>
        <p>这里可以接入排班、预约、提醒和售后。</p>
      </article>
    </section>

    <section id="page-profile" class="page">
      <article class="card">
        <h2>个人中心</h2>
        <p>这里可以接入用户资料、订单、积分和设置。</p>
      </article>
    </section>
  </main>

  <nav class="tab-bar" aria-label="底部导航">
    <button class="tab-item active" data-page="home">首页</button>
    <button class="tab-item" data-page="mall">商城</button>
    <button class="tab-item" data-page="booking">预约</button>
    <button class="tab-item" data-page="profile">我的</button>
  </nav>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <div class="modal" id="modal-boy" aria-hidden="true">
    <div class="modal-content">
      <h3>你的专属 AI 男友</h3>
      <p>随时聊天、情绪陪伴、日常提醒。</p>
      <p>“今天别太累，护理预约我帮你记好了。”</p>
      <button class="btn btn-close" data-close="boy">关闭</button>
    </div>
  </div>

  <div class="modal" id="modal-order" aria-hidden="true">
    <div class="modal-content">
      <h3>我的预约</h3>
      <p>待赴约：4.26 舒敏护理</p>
      <p>提醒已开启，到期自动推送。</p>
      <button class="btn btn-close" data-close="order">关闭</button>
    </div>
  </div>

  <div class="modal" id="modal-bill" aria-hidden="true">
    <div class="modal-content">
      <h3>账单与到账</h3>
      <p>消费记录、退款、到账明细实时更新。</p>
      <button class="btn btn-close" data-close="bill">关闭</button>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
